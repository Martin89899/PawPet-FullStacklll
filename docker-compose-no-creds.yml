services:
  # Base de datos PostgreSQL para cada microservicio
  auth-db:
    image: postgres:15
    container_name: pawpet-auth-db
    environment:
      POSTGRES_DB: pawpet_auth
      POSTGRES_USER: pawpet_user
      POSTGRES_PASSWORD: pawpet_password
    ports:
      - "5432:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    networks:
      - pawpet-network

  appointments-db:
    image: postgres:15
    container_name: pawpet-appointments-db
    environment:
      POSTGRES_DB: pawpet_appointments
      POSTGRES_USER: pawpet_user
      POSTGRES_PASSWORD: pawpet_password
    ports:
      - "5433:5432"
    volumes:
      - appointments_db_data:/var/lib/postgresql/data
    networks:
      - pawpet-network

  patients-db:
    image: postgres:15
    container_name: pawpet-patients-db
    environment:
      POSTGRES_DB: pawpet_patients
      POSTGRES_USER: pawpet_user
      POSTGRES_PASSWORD: pawpet_password
    ports:
      - "5434:5432"
    volumes:
      - patients_db_data:/var/lib/postgresql/data
    networks:
      - pawpet-network

  billing-db:
    image: postgres:15
    container_name: pawpet-billing-db
    environment:
      POSTGRES_DB: pawpet_billing
      POSTGRES_USER: pawpet_user
      POSTGRES_PASSWORD: pawpet_password
    ports:
      - "5435:5432"
    volumes:
      - billing_db_data:/var/lib/postgresql/data
    networks:
      - pawpet-network

  # RabbitMQ para comunicación asíncrona
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: pawpet-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: pawpet_user
      RABBITMQ_DEFAULT_PASS: pawpet_password
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - pawpet-network

  # Redis para caché del BFF
  redis:
    image: redis:7-alpine
    container_name: pawpet-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - pawpet-network
    command: redis-server --appendonly yes

  # Microservicios
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: pawpet-auth-service
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DB_HOST=auth-db
      - DB_PORT=5432
      - DB_NAME=pawpet_auth
      - DB_USER=pawpet_user
      - DB_PASSWORD=pawpet_password
      - RABBITMQ_URL=amqp://pawpet_user:pawpet_password@rabbitmq:5672/
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - CORS_ORIGIN=http://localhost:3101,http://localhost:3102,http://localhost:3103
    ports:
      - "3001:3001"
    depends_on:
      - auth-db
      - rabbitmq
    networks:
      - pawpet-network
    restart: unless-stopped

  patients-service:
    build:
      context: ./services/patients-service
      dockerfile: Dockerfile
    container_name: pawpet-patients-service
    environment:
      - NODE_ENV=development
      - PORT=3003
      - DB_HOST=patients-db
      - DB_PORT=5432
      - DB_NAME=pawpet_patients
      - DB_USER=pawpet_user
      - DB_PASSWORD=pawpet_password
      - RABBITMQ_URL=amqp://pawpet_user:pawpet_password@rabbitmq:5672/
      - AUTH_SERVICE_URL=http://auth-service:3001
      - CORS_ORIGIN=http://localhost:3101,http://localhost:3102,http://localhost:3103
    ports:
      - "3003:3003"
    depends_on:
      - patients-db
      - rabbitmq
      - auth-service
    networks:
      - pawpet-network
    restart: unless-stopped

  appointments-service:
    build:
      context: ./services/appointments-service
      dockerfile: Dockerfile
    container_name: pawpet-appointments-service
    environment:
      - NODE_ENV=development
      - PORT=3002
      - DB_HOST=appointments-db
      - DB_PORT=5432
      - DB_NAME=pawpet_appointments
      - DB_USER=pawpet_user
      - DB_PASSWORD=pawpet_password
      - RABBITMQ_URL=amqp://pawpet_user:pawpet_password@rabbitmq:5672/
      - AUTH_SERVICE_URL=http://auth-service:3001
      - CORS_ORIGIN=http://localhost:3101,http://localhost:3102,http://localhost:3103
    ports:
      - "3002:3002"
    depends_on:
      - appointments-db
      - rabbitmq
      - auth-service
    networks:
      - pawpet-network
    restart: unless-stopped

  bff-service:
    build:
      context: ./services/bff-service
      dockerfile: Dockerfile
    container_name: pawpet-bff-service
    environment:
      - NODE_ENV=development
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AUTH_SERVICE_URL=http://auth-service:3001
      - PATIENTS_SERVICE_URL=http://patients-service:3003
      - APPOINTMENTS_SERVICE_URL=http://appointments-service:3002
      - BILLING_SERVICE_URL=http://billing-service:3004
      - RABBITMQ_URL=amqp://pawpet_user:pawpet_password@rabbitmq:5672/
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - CORS_ORIGIN=http://localhost:3101,http://localhost:3102,http://localhost:3103
      - CACHE_TTL_SECONDS=300
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - patients-service
      - redis
      - rabbitmq
    networks:
      - pawpet-network
    restart: unless-stopped

  billing-service:
    build:
      context: ./services/billing-service
      dockerfile: Dockerfile
    container_name: pawpet-billing-service
    environment:
      - NODE_ENV=development
      - PORT=3004
      - DB_HOST=billing-db
      - DB_PORT=5432
      - DB_NAME=pawpet_billing
      - DB_USER=pawpet_user
      - DB_PASSWORD=pawpet_password
      - RABBITMQ_URL=amqp://pawpet_user:pawpet_password@rabbitmq:5672/
      - AUTH_SERVICE_URL=http://auth-service:3001
      - CORS_ORIGIN=http://localhost:3101,http://localhost:3102,http://localhost:3103
    ports:
      - "3004:3004"
    depends_on:
      - billing-db
      - rabbitmq
      - auth-service
    networks:
      - pawpet-network
    restart: unless-stopped

  # Aplicaciones frontend
  admin-portal:
    build:
      context: ./apps/admin-portal
      dockerfile: Dockerfile
    container_name: pawpet-admin-portal
    environment:
      REACT_APP_API_BASE_URL: http://localhost:3000
      REACT_APP_BFF_API: http://localhost:3000
    ports:
      - "3101:3000"
    depends_on:
      - auth-service
      - appointments-service
      - patients-service
      - billing-service
    networks:
      - pawpet-network
    volumes:
      - ./apps/admin-portal:/app
      - /app/node_modules

  client-portal:
    build:
      context: ./apps/client-portal
      dockerfile: Dockerfile
    container_name: pawpet-client-portal
    environment:
      REACT_APP_API_BASE_URL: http://localhost:3000
      REACT_APP_BFF_API: http://localhost:3000
    ports:
      - "3102:3000"
    depends_on:
      - auth-service
      - appointments-service
      - patients-service
      - billing-service
    networks:
      - pawpet-network
    volumes:
      - ./apps/client-portal:/app
      - /app/node_modules

  veterinarian-portal:
    build:
      context: ./apps/veterinarian-portal
      dockerfile: Dockerfile
    container_name: pawpet-veterinarian-portal
    environment:
      REACT_APP_API_BASE_URL: http://localhost:3000
      REACT_APP_BFF_API: http://localhost:3000
    ports:
      - "3103:3000"
    depends_on:
      - auth-service
      - appointments-service
      - patients-service
      - billing-service
    networks:
      - pawpet-network
    volumes:
      - ./apps/veterinarian-portal:/app
      - /app/node_modules

volumes:
  auth_db_data:
  appointments_db_data:
  patients_db_data:
  billing_db_data:
  rabbitmq_data:
  redis_data:

networks:
  pawpet-network:
    driver: bridge
